<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CLAW CATCHER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --pink: #ff2f8e;
    --cyan: #29d3ff;
    --yellow: #ffd23f;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden; overscroll-behavior: none;
    background: #0b0620;
    font-family: "DotGothic16", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    touch-action: none;
    position: fixed; inset: 0;
  }
  #game { position: absolute; inset: 0; }
  canvas { display: block; }

  #vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(5, 0, 20, .55) 100%);
  }

  /* ---- HUD ---- */
  #hud {
    position: absolute; top: calc(env(safe-area-inset-top, 0px) + 8px);
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    pointer-events: none; z-index: 5;
  }
  #logo {
    font-size: clamp(17px, 5vw, 24px); letter-spacing: 3px; color: #fff;
    text-shadow: 0 0 6px var(--pink), 0 0 16px var(--pink), 0 0 30px var(--pink);
    animation: logoGlow 2.4s ease-in-out infinite;
  }
  @keyframes logoGlow {
    50% { text-shadow: 0 0 4px var(--cyan), 0 0 14px var(--cyan), 0 0 28px var(--cyan); }
  }
  #counters { display: flex; gap: 10px; }
  .panel {
    display: flex; align-items: center; gap: 8px;
    background: rgba(5, 0, 22, .85);
    border: 2px solid var(--pink); border-radius: 10px;
    padding: 4px 14px;
    box-shadow: 0 0 12px rgba(255, 47, 142, .55), inset 0 0 10px rgba(255, 47, 142, .18);
  }
  .panel.cyan { border-color: var(--cyan); box-shadow: 0 0 12px rgba(41, 211, 255, .55), inset 0 0 10px rgba(41, 211, 255, .18); }
  .panel .lbl { font-size: 11px; color: var(--cyan); letter-spacing: 2px; }
  .panel.cyan .lbl { color: var(--pink); }
  .panel .num {
    font-size: 24px; color: var(--yellow); min-width: 2ch; text-align: right;
    text-shadow: 0 0 8px rgba(255, 210, 63, .9);
  }

  /* ---- message ---- */
  #msg {
    position: absolute; top: 32%; left: 0; right: 0;
    text-align: center; z-index: 6; pointer-events: none;
    font-size: clamp(34px, 10vw, 64px); letter-spacing: 2px;
    color: var(--yellow);
    text-shadow: 0 0 14px rgba(255, 210, 63, .9), 0 4px 0 #6b3f00, 0 8px 16px rgba(0,0,0,.6);
    opacity: 0; transform: scale(.5) rotate(-4deg); transition: all .16s cubic-bezier(.2, 2.2, .5, 1);
  }
  #msg.show { opacity: 1; transform: scale(1) rotate(0deg); }
  #msg.win {
    background: linear-gradient(90deg, var(--yellow), var(--pink), var(--cyan), var(--yellow));
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(255, 47, 142, .8)) drop-shadow(0 4px 8px rgba(0,0,0,.7));
    animation: rainbow 1.2s linear infinite;
  }
  @keyframes rainbow { to { background-position: 300% 0; } }

  #hint {
    position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 138px);
    left: 0; right: 0; text-align: center; z-index: 5; pointer-events: none;
    color: #fff; font-size: 16px; letter-spacing: 2px;
    text-shadow: 0 0 8px var(--cyan), 0 2px 6px rgba(0,0,0,.9);
    animation: blink 1.1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: .25; } }

  /* ---- controls ---- */
  #controls {
    position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    left: 0; right: 0;
    display: flex; justify-content: center; align-items: center; gap: 24px;
    z-index: 10;
  }
  .btn {
    width: 96px; height: 96px; border-radius: 50%;
    border: 5px solid #0a0518; outline: none;
    color: #fff; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    touch-action: none; cursor: pointer;
    transition: transform .06s, filter .15s;
    box-shadow:
      0 0 0 4px #2a1a45,
      0 7px 0 4px #120a28,
      0 12px 24px rgba(0,0,0,.6),
      inset 0 4px 8px rgba(255,255,255,.5),
      inset 0 -6px 10px rgba(0,0,0,.35);
  }
  .btn .arrow { font-size: 36px; line-height: 1; text-shadow: 0 2px 3px rgba(0,0,0,.5); }
  .btn .label { font-size: 13px; margin-top: 2px; letter-spacing: 2px; text-shadow: 0 2px 3px rgba(0,0,0,.5); }
  .btn:active, .btn.pressed {
    transform: translateY(5px) scale(.97);
    box-shadow:
      0 0 0 4px #2a1a45,
      0 2px 0 4px #120a28,
      0 5px 12px rgba(0,0,0,.6),
      inset 0 4px 8px rgba(255,255,255,.5),
      inset 0 -6px 10px rgba(0,0,0,.35);
  }
  .btn:disabled { filter: grayscale(.9) brightness(.45); pointer-events: none; animation: none; }
  #btnX { background: radial-gradient(circle at 34% 28%, #ffa5cd, #ff2f8e 55%, #99114f); }
  #btnX:not(:disabled) { animation: pulsePink 1.5s ease-in-out infinite; }
  #btnZ { background: radial-gradient(circle at 34% 28%, #9fe2ff, #29a5ff 55%, #0e4e9e); }
  #btnZ:not(:disabled) { animation: pulseCyan 1.5s ease-in-out infinite; }
  @keyframes pulsePink {
    50% { box-shadow: 0 0 0 4px #2a1a45, 0 7px 0 4px #120a28, 0 0 30px 6px rgba(255,47,142,.7), inset 0 4px 8px rgba(255,255,255,.5), inset 0 -6px 10px rgba(0,0,0,.35); }
  }
  @keyframes pulseCyan {
    50% { box-shadow: 0 0 0 4px #2a1a45, 0 7px 0 4px #120a28, 0 0 30px 6px rgba(41,211,255,.7), inset 0 4px 8px rgba(255,255,255,.5), inset 0 -6px 10px rgba(0,0,0,.35); }
  }
  #btnCoin {
    height: 56px; border-radius: 12px; padding: 0 18px;
    border: 3px solid #6b4a00; color: #4a2c00; font-family: inherit; font-size: 15px;
    letter-spacing: 1px;
    background: linear-gradient(#ffe680, #ffb930 60%, #e09a10);
    box-shadow: 0 6px 0 #8a5f00, 0 10px 18px rgba(0,0,0,.55), inset 0 2px 4px rgba(255,255,255,.7);
    touch-action: none; cursor: pointer;
    transition: transform .06s;
  }
  #btnCoin:active { transform: translateY(4px); box-shadow: 0 2px 0 #8a5f00, inset 0 2px 4px rgba(255,255,255,.7); }
  #btnCoin.attention { animation: coinBlink .8s steps(2) infinite; }
  @keyframes coinBlink { 50% { filter: brightness(1.5); } }
</style>
</head>
<body>
<div id="game"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="logo">★ CLAW CATCHER ★</div>
  <div id="counters">
    <div class="panel"><span class="lbl">CREDITS</span><span class="num" id="plays">05</span></div>
    <div class="panel cyan"><span class="lbl">PRIZES</span><span class="num" id="wins">00</span></div>
  </div>
</div>

<div id="msg"></div>
<div id="hint">→ ボタンで スタート!</div>

<div id="controls">
  <button id="btnCoin">🪙 INSERT COIN</button>
  <button id="btnX" class="btn"><span class="arrow">→</span><span class="label">ヨコ</span></button>
  <button id="btnZ" class="btn" disabled><span class="arrow">↑</span><span class="label">オク</span></button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ================= 基本設定 ================= */
const FIELD = 2.0;          // 内寸の半分
const WALL_H = 4.0;
const RAIL_Y = 3.7;
const CLAW_TOP_Y = 3.0;     // アーム待機高さ
const CLAW_BOTTOM_Y = 0.88; // 下降の最下点 (指先が景品の下に回り込める深さ)
// 景品落とし口 (手前左): x [-2,-0.9], z [0.9,2]
const HOLE = { x0: -2.0, x1: -0.9, z0: 0.9, z1: 2.0 };
const HOME = { x: (HOLE.x0 + HOLE.x1) / 2, z: (HOLE.z0 + HOLE.z1) / 2 };
const X_MAX = 1.6, Z_MIN = -1.6;
const MOVE_SPEED = 1.15, DROP_SPEED = 1.4, LIFT_SPEED = 1.2, RETURN_SPEED = 1.1;
const PRIZE_COUNT = 7;

let plays = 5, wins = 0;

/* ================= three.js ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.getElementById('game').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0620);
scene.fog = new THREE.Fog(0x0b0620, 11, 26);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 60);
function layout() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  const a = Math.max(0.55, Math.min(camera.aspect, 1.4));
  camera.position.set(0, 5.4, 7.6 / a * (a < 1 ? 0.92 : 1));
  camera.fov = a < 1 ? Math.min(78, 55 / (a * 1.18)) : 55;
  camera.lookAt(0, 1.55, 0);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', layout);

scene.add(new THREE.HemisphereLight(0xcdd7ff, 0x402a55, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(3.5, 9, 4.5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -4; sun.shadow.camera.right = 4;
sun.shadow.camera.top = 5; sun.shadow.camera.bottom = -4;
scene.add(sun);
const fill = new THREE.PointLight(0xff9ecb, 12, 12);
fill.position.set(0, 3.6, 2.5);
scene.add(fill);

/* ================= cannon-es ================= */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.solver.iterations = 14;
const matGround = new CANNON.Material('ground');
const matPrize = new CANNON.Material('prize');
const matClaw = new CANNON.Material('claw');
world.addContactMaterial(new CANNON.ContactMaterial(matGround, matPrize, { friction: 0.45, restitution: 0.25 }));
world.addContactMaterial(new CANNON.ContactMaterial(matPrize, matPrize, { friction: 0.4, restitution: 0.2 }));
world.addContactMaterial(new CANNON.ContactMaterial(matClaw, matPrize, {
  friction: 0.9, restitution: 0,
  contactEquationStiffness: 1e7, contactEquationRelaxation: 4,
}));
// 衝突グループ: 指は景品だけと衝突させる
const G_STATIC = 1, G_PRIZE = 2, G_CLAW = 4;

function staticBox(cx, cy, cz, sx, sy, sz) {
  const body = new CANNON.Body({
    type: CANNON.Body.STATIC, material: matGround,
    shape: new CANNON.Box(new CANNON.Vec3(sx / 2, sy / 2, sz / 2)),
  });
  body.position.set(cx, cy, cz);
  world.addBody(body);
  return body;
}

/* ================= 筐体 ================= */
const machine = new THREE.Group();
scene.add(machine);

const carpetMat = new THREE.MeshStandardMaterial({ color: 0x2fae6b, roughness: 0.95 });
const frameMat = new THREE.MeshStandardMaterial({ color: 0xff4f92, roughness: 0.35, metalness: 0.3 });
const darkMat = new THREE.MeshStandardMaterial({ color: 0x241238, roughness: 0.8 });

function box(mat, cx, cy, cz, sx, sy, sz, shadow = true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
  m.position.set(cx, cy, cz);
  m.castShadow = shadow; m.receiveShadow = true;
  machine.add(m);
  return m;
}

// 床 (穴を除いた2枚) — 物理も同形状
box(carpetMat, 0, -0.25, (HOLE.z0 - FIELD) / 2, FIELD * 2, 0.5, HOLE.z0 + FIELD);
staticBox(0, -0.25, (HOLE.z0 - FIELD) / 2, FIELD * 2, 0.5, HOLE.z0 + FIELD);
box(carpetMat, (HOLE.x1 + FIELD) / 2, -0.25, (HOLE.z0 + FIELD) / 2, FIELD - HOLE.x1, 0.5, FIELD - HOLE.z0);
staticBox((HOLE.x1 + FIELD) / 2, -0.25, (HOLE.z0 + FIELD) / 2, FIELD - HOLE.x1, 0.5, FIELD - HOLE.z0);

// 落とし口のバリア (黄色い縁)
const bh = 0.55, bt = 0.1;
const rimMat = new THREE.MeshStandardMaterial({ color: 0xffd23f, roughness: 0.4 });
box(rimMat, HOLE.x1, bh / 2, (HOLE.z0 + HOLE.z1) / 2, bt, bh, HOLE.z1 - HOLE.z0 + bt);
staticBox(HOLE.x1, bh / 2, (HOLE.z0 + HOLE.z1) / 2, bt, bh, HOLE.z1 - HOLE.z0 + bt);
box(rimMat, (HOLE.x0 + HOLE.x1) / 2, bh / 2, HOLE.z0, HOLE.x1 - HOLE.x0, bh, bt);
staticBox((HOLE.x0 + HOLE.x1) / 2, bh / 2, HOLE.z0, HOLE.x1 - HOLE.x0, bh, bt);

// 落とし口の内壁 (下に続く暗い筒)
const holeW = HOLE.x1 - HOLE.x0, holeD = HOLE.z1 - HOLE.z0;

// 見えない壁: 獲得口には真上からしか入れない (バリア越え・回り込み・すり抜け防止)
const SHAFT_TOP = 1.7;
staticBox(HOLE.x1, SHAFT_TOP / 2, (HOLE.z0 + HOLE.z1) / 2, bt, SHAFT_TOP, holeD + 0.4);          // 右 (内側)
staticBox((HOLE.x0 + HOLE.x1) / 2, SHAFT_TOP / 2, HOLE.z0, holeW + 0.4, SHAFT_TOP, bt);          // 奥 (内側)
staticBox(HOLE.x0 - 0.06, SHAFT_TOP / 2, (HOLE.z0 + HOLE.z1) / 2, 0.12, SHAFT_TOP, holeD + 0.4); // 左 (ガラス沿い)
staticBox((HOLE.x0 + HOLE.x1) / 2, SHAFT_TOP / 2, HOLE.z1 + 0.06, holeW + 0.4, SHAFT_TOP, 0.12); // 手前 (ガラス沿い)
box(darkMat, HOLE.x0 + holeW / 2, -0.9, HOLE.z0 - 0.02, holeW, 1.8, 0.04, false);
box(darkMat, HOLE.x0 + holeW / 2, -0.9, HOLE.z1 + 0.02, holeW, 1.8, 0.04, false);
box(darkMat, HOLE.x0 - 0.02, -0.9, HOLE.z0 + holeD / 2, 0.04, 1.8, holeD, false);
box(darkMat, HOLE.x1 + 0.02, -0.9, HOLE.z0 + holeD / 2, 0.04, 1.8, holeD, false);

// 土台
box(darkMat, 0, -1.0, 0, FIELD * 2 + 0.6, 1.5, FIELD * 2 + 0.6);
box(frameMat, 0, -1.78, 0, FIELD * 2 + 0.8, 0.16, FIELD * 2 + 0.8);
// GET口 (正面パネル)
{
  const c = document.createElement('canvas'); c.width = 256; c.height = 128;
  const g = c.getContext('2d');
  g.fillStyle = '#0a0518'; g.fillRect(0, 0, 256, 128);
  g.strokeStyle = '#ffd23f'; g.lineWidth = 6; g.strokeRect(6, 6, 244, 116);
  g.fillStyle = '#ffd23f'; g.font = '900 60px sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = '#ffd23f'; g.shadowBlur = 16;
  g.fillText('GET!', 128, 66);
  const t = new THREE.CanvasTexture(c);
  const p = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.5), new THREE.MeshBasicMaterial({ map: t }));
  p.position.set(HOME.x, -0.9, FIELD + 0.31);
  machine.add(p);
}

// ガラス壁 (見た目)
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xbfe4ff, transmission: 0.92, transparent: true, opacity: 0.22,
  roughness: 0.05, metalness: 0, side: THREE.DoubleSide, depthWrite: false,
});
function glass(cx, cy, cz, sx, sy, sz) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), glassMat);
  m.position.set(cx, cy, cz);
  machine.add(m);
}
glass(0, WALL_H / 2, -FIELD - 0.03, FIELD * 2, WALL_H, 0.06);
glass(-FIELD - 0.03, WALL_H / 2, 0, 0.06, WALL_H, FIELD * 2);
glass(FIELD + 0.03, WALL_H / 2, 0, 0.06, WALL_H, FIELD * 2);
glass(0, WALL_H / 2, FIELD + 0.03, FIELD * 2, WALL_H, 0.06);
// ガラス壁 (物理)
staticBox(0, WALL_H / 2, -FIELD - 0.1, FIELD * 2 + 0.4, WALL_H, 0.2);
staticBox(0, WALL_H / 2, FIELD + 0.1, FIELD * 2 + 0.4, WALL_H, 0.2);
staticBox(-FIELD - 0.1, WALL_H / 2, 0, 0.2, WALL_H, FIELD * 2 + 0.4);
staticBox(FIELD + 0.1, WALL_H / 2, 0, 0.2, WALL_H, FIELD * 2 + 0.4);

// 支柱と上部フレーム
for (const [px, pz] of [[-FIELD, -FIELD], [FIELD, -FIELD], [-FIELD, FIELD], [FIELD, FIELD]]) {
  box(frameMat, px * 1.02, WALL_H / 2, pz * 1.02, 0.18, WALL_H, 0.18);
}
box(frameMat, 0, WALL_H + 0.1, -FIELD, FIELD * 2 + 0.4, 0.22, 0.2);
box(frameMat, 0, WALL_H + 0.1, FIELD, FIELD * 2 + 0.4, 0.22, 0.2);
box(frameMat, -FIELD, WALL_H + 0.1, 0, 0.2, 0.22, FIELD * 2);
box(frameMat, FIELD, WALL_H + 0.1, 0, 0.2, 0.22, FIELD * 2);

// 手前の支柱のネオンライン
const neonStripMat = new THREE.MeshBasicMaterial({ color: 0x29d3ff });
for (const px of [-FIELD, FIELD]) {
  const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05, WALL_H - 0.3, 0.05), neonStripMat);
  strip.position.set(px * 1.02, WALL_H / 2, FIELD * 1.02 + 0.1);
  machine.add(strip);
}

// 電飾看板
{
  const c = document.createElement('canvas'); c.width = 1024; c.height = 160;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 1024, 0);
  grad.addColorStop(0, '#ff2f8e'); grad.addColorStop(0.5, '#8a2fff'); grad.addColorStop(1, '#29a5ff');
  g.fillStyle = grad; g.fillRect(0, 0, 1024, 160);
  g.fillStyle = '#fff'; g.font = '900 88px sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = '#fff'; g.shadowBlur = 14;
  g.fillText('CLAW CATCHER', 512, 86);
  const t = new THREE.CanvasTexture(c);
  const p = new THREE.Mesh(new THREE.PlaneGeometry(4.4, 0.66), new THREE.MeshBasicMaterial({ map: t }));
  p.position.set(0, WALL_H + 0.55, FIELD + 0.11);
  machine.add(p);
}

// 看板上の電球 (色が流れる)
const bulbMats = [
  new THREE.MeshBasicMaterial({ color: 0xff2f8e }),
  new THREE.MeshBasicMaterial({ color: 0xffd23f }),
  new THREE.MeshBasicMaterial({ color: 0x29d3ff }),
];
const bulbs = [];
const bulbGeo = new THREE.SphereGeometry(0.055, 10, 8);
for (let i = 0; i < 13; i++) {
  const b = new THREE.Mesh(bulbGeo, bulbMats[i % 3]);
  b.position.set(-1.95 + i * 0.325, WALL_H + 0.98, FIELD + 0.12);
  machine.add(b);
  bulbs.push(b);
}

/* ================= 背景 (ゲームセンター) ================= */
// アーケードカーペットの床
{
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#150a2e'; g.fillRect(0, 0, 256, 256);
  const cols = ['#ff2f8e', '#29d3ff', '#ffd23f', '#7dff8a', '#c08fff'];
  for (let i = 0; i < 70; i++) {
    const col = cols[i % cols.length];
    const x = Math.random() * 256, y = Math.random() * 256;
    g.globalAlpha = 0.4 + Math.random() * 0.3;
    g.fillStyle = col; g.strokeStyle = col; g.lineWidth = 2.5;
    const kind = i % 3;
    if (kind === 0) {
      g.beginPath(); g.arc(x, y, 2.5 + Math.random() * 3.5, 0, Math.PI * 2); g.fill();
    } else if (kind === 1) {
      const s = 5 + Math.random() * 6;
      g.beginPath(); g.moveTo(x, y - s); g.lineTo(x + s, y + s); g.lineTo(x - s, y + s); g.closePath(); g.fill();
    } else {
      g.beginPath(); g.moveTo(x, y);
      for (let k = 1; k <= 3; k++) g.lineTo(x + k * 7, y + (k % 2 ? -6 : 6));
      g.stroke();
    }
  }
  g.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(7, 7);
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshStandardMaterial({ map: t, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1.86;
  floor.receiveShadow = true;
  scene.add(floor);
}

// ネオンサインを作るヘルパー
function neonSign(text, color, w, h) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 160;
  const g = c.getContext('2d');
  g.font = '900 84px sans-serif';

function makeFinger() {

  tip.position.y = -SEG_LEN - 0.055;

}

const _qy = new CANNON.Quaternion(), _qz = new CANNON.Quaternion();
function updateClawShapes() {
  for (let i = 0; i < 3; i++) {
    const yaw = (i / 3) * Math.PI * 2;
    const cosYaw = Math.cos(yaw), sinYaw = Math.sin(yaw);
    const theta = FINGER_CLOSED + (FINGER_OPEN - FINGER_CLOSED) * fingerOpen[i];
    const ct = Math.cos(theta), st = Math.sin(theta);
    _qy.setFromAxisAngle(CANNON.Vec3.UNIT_Y, yaw);
    for (let k = 0; k < 3; k++) {
      const s = FINGER_SEGS[k];
      const lx = 0.16 + s.cx * ct - s.cy * st; // ヒンジ座標系での位置
      const ly = -0.1 + s.cx * st + s.cy * ct;
      const idx = 1 + i * 3 + k;
      clawBody.shapeOffsets[idx].set(lx * cosYaw, ly, -lx * sinYaw);
      _qz.setFromAxisAngle(CANNON.Vec3.UNIT_Z, theta + s.ang);
      _qy.mult(_qz, clawBody.shapeOrientations[idx]);
    }
  }
  clawBody.updateBoundingRadius();
  clawBody.aabbNeedsUpdate = true;
}

let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur = 0.1, type = 'square', vol = 0.12, delay = 0) {
  try {
    const ctx = audio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    const t0 = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t0); o.stop(t0 + dur);
  } catch (e) { /* 音は無くてもゲームは続行 */ }
}

/* ================= つかみ (完全物理) =================
   判定は無し。閉じる途中で景品に触れている指はゆっくりとしか握り込めず、
   持ち上がるかどうかは指のコライダーと景品の摩擦・形状だけで決まる。 */
// 運搬中、景品がずり落ち続けている時だけ指を握り直す (瞬間的な揺れでは動かさない)
let slipT = 0;
function ratchetGrip(dt) {
  let slipping = false;
  for (const p of prizes) {
    const b = p.body;
    if (Math.hypot(b.position.x - clawBody.position.x, b.position.z - clawBody.position.z) < 0.5 &&
        b.position.y < clawBody.position.y && b.position.y > clawBody.position.y - 1.2 &&
        clawBody.velocity.y - b.velocity.y > 0.15) {
      slipping = true;
    }
  }
  slipT = slipping ? slipT + dt : 0;
  if (slipT > 0.12) {
    for (let i = 0; i < 3; i++) {
      if (fingerDepth[i] < 0.02) {
        fingerOpen[i] = Math.max(0, fingerOpen[i] - dt / (fingerTouched[i] ? 8.0 : 0.8));
      }
    }
  }
}

function moveFingers(target, duration, dt) {
  let done = true;
  for (let i = 0; i < 3; i++) {
    const d = target - fingerOpen[i];
    const step = dt / duration;
    if (Math.abs(d) <= step) fingerOpen[i] = target;
    else { fingerOpen[i] += Math.sign(d) * step; done = false; }
  }
  return done;
}

/* ================= メインループ ================= */
function moveToward(current, target, speed, dt) {
  const d = target - current;
  const step = speed * dt;
  return Math.abs(d) <= step ? target : current + Math.sign(d) * step;
}

let last = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.max(0.001, Math.min(0.05, (now - last) / 1000));
  last = now;
  const t = now / 1000;
  stateTime += dt;

  /* --- 状態マシン --- */
  switch (state) {
    case 'MOVE_X':
      if (holdX) clawPos.x = Math.min(X_MAX, clawPos.x + MOVE_SPEED * dt);
      break;
    case 'MOVE_Z':
      if (holdZ) clawPos.z = Math.max(Z_MIN, clawPos.z - MOVE_SPEED * dt);
      break;
    case 'OPENING': // 降りる前にアームを開く
      if (moveFingers(1, 0.45, dt) && stateTime > 0.55) setState('DESCEND');
      break;
    case 'DESCEND':
      clawPos.y = moveToward(clawPos.y, CLAW_BOTTOM_Y, DROP_SPEED, dt);
      // ロープがたるんで山の上で止まることもあるので、実体の落ち着きを待つ
      if (clawPos.y === CLAW_BOTTOM_Y &&
          (clawBody.position.y - CLAW_BOTTOM_Y < 0.25 || stateTime > 2.6)) {
        grabSfxDone = false;
        setState('GRAB');
      }
      break;
    case 'GRAB': {
      // 接触なし: 普通に閉じる / 浅い接触: ゆっくり回り込む / 深いめり込み: 停止
      let allClosed = true;
      for (let i = 0; i < 3; i++) {
        if (fingerDepth[i] < 0.02) {
          fingerOpen[i] = Math.max(0, fingerOpen[i] - dt / (fingerTouched[i] ? 8.0 : 0.8));
        }
        if (fingerOpen[i] > 0) allClosed = false;
        if (fingerTouched[i] && !grabSfxDone) {
          grabSfxDone = true;
          sfx.grab();
          if (navigator.vibrate) navigator.vibrate(40);
        }
      }
      // 空振りなら閉じ切って終了、掴んでいれば少し馴染ませてから上昇
      if ((allClosed && stateTime > 0.9) || stateTime > 1.6) setState('LIFT');
      break;
    }
    case 'LIFT':
      ratchetGrip(dt);
      clawPos.y = moveToward(clawPos.y, CLAW_TOP_Y, LIFT_SPEED, dt);
      if (clawPos.y === CLAW_TOP_Y &&
          (CLAW_TOP_Y - clawBody.position.y < 0.3 || stateTime > 3.2)) {
        carried = prizes.find(p =>
          Math.hypot(p.body.position.x - clawBody.position.x, p.body.position.z - clawBody.position.z) < 0.55 &&
          p.body.position.y > CLAW_TOP_Y - 1.4
        ) || null;
        setState('RETURN');
      }
      break;
    case 'RETURN':
      ratchetGrip(dt);
      clawPos.x = moveToward(clawPos.x, HOME.x, RETURN_SPEED, dt);
      clawPos.z = moveToward(clawPos.z, HOME.z, RETURN_SPEED, dt);
      if (carried && carried.alive && carried.body.position.y < 1.1) {
        carried = null;
        showMsg('あっ…!', 900);
        tone(200, 0.2, 'sine', 0.1);
      }
      if (clawPos.x === HOME.x && clawPos.z === HOME.z &&
          (Math.hypot(clawBody.position.x - HOME.x, clawBody.position.z - HOME.z) < 0.3 || stateTime > 4.5)) {
        setState('OPEN');
      }
      break;
    case 'OPEN':
      if (moveFingers(1, 0.35, dt) && stateTime > 0.6) setState('WAIT');
      break;
    case 'WAIT':
      moveFingers(0, 0.5, dt); // 通常は閉じて待機
      if (stateTime > 1.7) {
        if (!justWon) { showMsg('ざんねん…', 1100); sfx.lose(); }
        justWon = false;
        carried = null;
        setState('READY');
      }
      break;
  }

  /* --- 物理 --- */
  updateClawShapes(); // 指の開閉をシェイプ配置に反映
  applyRopeForce();   // ロープ (ばね) でクローを吊る
  world.step(1 / 60, dt, 3);

  // 指と景品の接触・めり込み深さを検出 (閉じ動作の制御に使う)
  fingerTouched = [false, false, false];
  fingerDepth = [0, 0, 0];
  for (const eq of world.contacts) {
    if (eq.bi === clawBody || eq.bj === clawBody) {
      const shape = eq.bi === clawBody ? eq.si : eq.sj;
      const other = eq.bi === clawBody ? eq.bj : eq.bi;
      if (other.material === matPrize && shape.fingerIndex !== undefined) {
        const i = shape.fingerIndex;
        fingerTouched[i] = true;
        // めり込み深さ: 接触点間ギャップの符号反転
        _gap.copy(eq.bj.position); _gap.vadd(eq.rj, _gap);
        _gap.vsub(eq.bi.position, _gap); _gap.vsub(eq.ri, _gap);
        const d = -_gap.dot(eq.ni);
        if (d > fingerDepth[i]) fingerDepth[i] = d;
      }
    }
  }

  for (const p of [...prizes]) {
    p.mesh.position.copy(p.body.position);
    p.mesh.quaternion.copy(p.body.quaternion);
    // 落とし口に落ちた → GET
    if (p.body.position.y < -0.8) {
      if (p === carried) carried = null;
      removePrize(p);
      wins++;
      justWon = true;
      updateHUD();
      showMsg('🎉 GET!! 🎉', 1800, true);
      sfx.win();
      if (navigator.vibrate) navigator.vibrate([60, 40, 120]);
      setTimeout(() => {
        const { x, z } = randomSpawnXZ();
        spawnPrize(x, 3.4, z);
      }, 1200);
    }
  }

  /* --- 背景アニメ --- */
  const phase = Math.floor(t * 4);
  for (let i = 0; i < bulbs.length; i++) bulbs[i].material = bulbMats[(i + phase) % 3];
  for (const s of signs) {
    const p = s.userData.phase;
    s.material.opacity = 0.82 + 0.18 * Math.sin(t * 9 + p);
    if (Math.sin(t * 6.7 + p * 3.1) > 0.985) s.material.opacity *= 0.35;
  }
  for (let i = 0; i < ringDecos.length; i++) ringDecos[i].rotation.z = t * (0.3 + i * 0.15);
  if (window.__stars) window.__stars.rotation.y = t * 0.012;

  syncCrane();
  renderer.render(scene, camera);
}

layout();
updateHUD();
setState('READY');
syncCrane();
requestAnimationFrame(animate);
</script>
</body>
</html>
