<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CLAW CATCHER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --pink: #ff2f8e;
    --cyan: #29d3ff;
    --yellow: #ffd23f;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden; overscroll-behavior: none;
    background: #0b0620;
    font-family: "DotGothic16", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    touch-action: none;
    position: fixed; inset: 0;
  }
  #game { position: absolute; inset: 0; }
  canvas { display: block; }

  #vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(5, 0, 20, .55) 100%);
  }

  /* ---- HUD ---- */
  #hud {
    position: absolute; top: calc(env(safe-area-inset-top, 0px) + 8px);
    left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    pointer-events: none; z-index: 5;
  }
  #logo {
    font-size: clamp(17px, 5vw, 24px); letter-spacing: 3px; color: #fff;
    text-shadow: 0 0 6px var(--pink), 0 0 16px var(--pink), 0 0 30px var(--pink);
    animation: logoGlow 2.4s ease-in-out infinite;
  }
  @keyframes logoGlow {
    50% { text-shadow: 0 0 4px var(--cyan), 0 0 14px var(--cyan), 0 0 28px var(--cyan); }
  }
  #counters { display: flex; gap: 10px; }
  .panel {
    display: flex; align-items: center; gap: 8px;
    background: rgba(5, 0, 22, .85);
    border: 2px solid var(--pink); border-radius: 10px;
    padding: 4px 14px;
    box-shadow: 0 0 12px rgba(255, 47, 142, .55), inset 0 0 10px rgba(255, 47, 142, .18);
  }
  .panel.cyan { border-color: var(--cyan); box-shadow: 0 0 12px rgba(41, 211, 255, .55), inset 0 0 10px rgba(41, 211, 255, .18); }
  .panel .lbl { font-size: 11px; color: var(--cyan); letter-spacing: 2px; }
  .panel.cyan .lbl { color: var(--pink); }
  .panel .num {
    font-size: 24px; color: var(--yellow); min-width: 2ch; text-align: right;
    text-shadow: 0 0 8px rgba(255, 210, 63, .9);
  }

  /* ---- 筐体タブ ---- */
  #tabs { display: flex; gap: 8px; pointer-events: auto; }
  .tab {
    font-family: inherit; font-size: 13px; letter-spacing: 1px;
    color: #b9a4d6; background: rgba(5, 0, 22, .85);
    border: 2px solid #4a3070; border-radius: 10px;
    padding: 6px 14px; cursor: pointer;
    transition: color .15s, border-color .15s, box-shadow .15s;
  }
  .tab.active {
    color: #fff; border-color: var(--yellow);
    box-shadow: 0 0 12px rgba(255, 210, 63, .55), inset 0 0 8px rgba(255, 210, 63, .15);
  }

  /* ---- BGM ---- */
  #btnBgm {
    position: absolute; top: calc(env(safe-area-inset-top, 0px) + 8px);
    right: 10px; z-index: 11;
    font-family: inherit; font-size: 13px; letter-spacing: 1px;
    color: #fff; background: rgba(5, 0, 22, .85);
    border: 2px solid var(--cyan); border-radius: 10px;
    padding: 6px 12px; cursor: pointer;
    box-shadow: 0 0 10px rgba(41, 211, 255, .45);
  }
  #btnBgm.off { color: #776a92; border-color: #4a3070; box-shadow: none; }

  /* ---- message ---- */
  #msg {
    position: absolute; top: 32%; left: 0; right: 0;
    text-align: center; z-index: 6; pointer-events: none;
    font-size: clamp(34px, 10vw, 64px); letter-spacing: 2px;
    color: var(--yellow);
    text-shadow: 0 0 14px rgba(255, 210, 63, .9), 0 4px 0 #6b3f00, 0 8px 16px rgba(0,0,0,.6);
    opacity: 0; transform: scale(.5) rotate(-4deg); transition: all .16s cubic-bezier(.2, 2.2, .5, 1);
  }
  #msg.show { opacity: 1; transform: scale(1) rotate(0deg); }
  #msg.win {
    background: linear-gradient(90deg, var(--yellow), var(--pink), var(--cyan), var(--yellow));
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(255, 47, 142, .8)) drop-shadow(0 4px 8px rgba(0,0,0,.7));
    animation: rainbow 1.2s linear infinite;
  }
  @keyframes rainbow { to { background-position: 300% 0; } }

  #hint {
    position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 138px);
    left: 0; right: 0; text-align: center; z-index: 5; pointer-events: none;
    color: #fff; font-size: 16px; letter-spacing: 2px;
    text-shadow: 0 0 8px var(--cyan), 0 2px 6px rgba(0,0,0,.9);
    animation: blink 1.1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: .25; } }

  /* ---- controls ---- */
  #controls {
    position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    left: 0; right: 0;
    display: flex; justify-content: center; align-items: center; gap: 24px;
    z-index: 10;
  }
  .btn {
    width: 96px; height: 96px; border-radius: 50%;
    border: 5px solid #0a0518; outline: none;
    color: #fff; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    touch-action: none; cursor: pointer;
    transition: transform .06s, filter .15s;
    box-shadow:
      0 0 0 4px #2a1a45,
      0 7px 0 4px #120a28,
      0 12px 24px rgba(0,0,0,.6),
      inset 0 4px 8px rgba(255,255,255,.5),
      inset 0 -6px 10px rgba(0,0,0,.35);
  }
  .btn .arrow { font-size: 36px; line-height: 1; text-shadow: 0 2px 3px rgba(0,0,0,.5); }
  .btn .label { font-size: 13px; margin-top: 2px; letter-spacing: 2px; text-shadow: 0 2px 3px rgba(0,0,0,.5); }
  .btn:active, .btn.pressed {
    transform: translateY(5px) scale(.97);
    box-shadow:
      0 0 0 4px #2a1a45,
      0 2px 0 4px #120a28,
      0 5px 12px rgba(0,0,0,.6),
      inset 0 4px 8px rgba(255,255,255,.5),
      inset 0 -6px 10px rgba(0,0,0,.35);
  }
  .btn:disabled { filter: grayscale(.9) brightness(.45); pointer-events: none; animation: none; }
  #btnX { background: radial-gradient(circle at 34% 28%, #ffa5cd, #ff2f8e 55%, #99114f); }
  #btnX:not(:disabled) { animation: pulsePink 1.5s ease-in-out infinite; }
  #btnZ { background: radial-gradient(circle at 34% 28%, #9fe2ff, #29a5ff 55%, #0e4e9e); }
  #btnZ:not(:disabled) { animation: pulseCyan 1.5s ease-in-out infinite; }
  @keyframes pulsePink {
    50% { box-shadow: 0 0 0 4px #2a1a45, 0 7px 0 4px #120a28, 0 0 30px 6px rgba(255,47,142,.7), inset 0 4px 8px rgba(255,255,255,.5), inset 0 -6px 10px rgba(0,0,0,.35); }
  }
  @keyframes pulseCyan {
    50% { box-shadow: 0 0 0 4px #2a1a45, 0 7px 0 4px #120a28, 0 0 30px 6px rgba(41,211,255,.7), inset 0 4px 8px rgba(255,255,255,.5), inset 0 -6px 10px rgba(0,0,0,.35); }
  }
  #btnCoin {
    height: 56px; border-radius: 12px; padding: 0 18px;
    border: 3px solid #6b4a00; color: #4a2c00; font-family: inherit; font-size: 15px;
    letter-spacing: 1px;
    background: linear-gradient(#ffe680, #ffb930 60%, #e09a10);
    box-shadow: 0 6px 0 #8a5f00, 0 10px 18px rgba(0,0,0,.55), inset 0 2px 4px rgba(255,255,255,.7);
    touch-action: none; cursor: pointer;
    transition: transform .06s;
  }
  #btnCoin:active { transform: translateY(4px); box-shadow: 0 2px 0 #8a5f00, inset 0 2px 4px rgba(255,255,255,.7); }
  #btnCoin.attention { animation: coinBlink .8s steps(2) infinite; }
  @keyframes coinBlink { 50% { filter: brightness(1.5); } }
</style>
</head>
<body>
<div id="game"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="logo">★ CLAW CATCHER ★</div>
  <div id="counters">
    <div class="panel"><span class="lbl">CREDITS</span><span class="num" id="plays">05</span></div>
    <div class="panel cyan"><span class="lbl">PRIZES</span><span class="num" id="wins">00</span></div>
  </div>
  <div id="tabs">
    <button class="tab active" data-m="0">🕹 3本爪</button>
    <button class="tab" data-m="1">🛸 橋渡し</button>
  </div>
</div>

<button id="btnBgm">🔊 BGM</button>

<div id="msg"></div>
<div id="hint">→ ボタンで スタート!</div>

<div id="controls">
  <button id="btnCoin">🪙 INSERT COIN</button>
  <button id="btnX" class="btn"><span class="arrow">→</span><span class="label">ヨコ</span></button>
  <button id="btnZ" class="btn" disabled><span class="arrow">↑</span><span class="label">オク</span></button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ================= 基本設定 ================= */
const FIELD = 2.0;          // 内寸の半分
const WALL_H = 4.0;
const RAIL_Y = 3.7;
const CLAW_TOP_Y = 3.0;     // アーム待機高さ
const MOVE_SPEED = 1.15, DROP_SPEED = 1.4, LIFT_SPEED = 1.2, RETURN_SPEED = 1.1;

let plays = 5, wins = 0;

/* ================= three.js ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.getElementById('game').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0620);
scene.fog = new THREE.Fog(0x0b0620, 12, 34);

const MACHINE_X = [-3.4, 3.4]; // 2台の筐体の中心位置

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 60);
camera.position.set(MACHINE_X[0], 5.4, 8.2);

// ドラッグ / スワイプで筐体の周囲を回り込めるカメラ
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(MACHINE_X[0], 1.55, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 4.5;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.55; // 床の下には回り込まない
controls.update();

function layout() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  const a = Math.max(0.55, Math.min(camera.aspect, 1.4));
  camera.fov = a < 1 ? Math.min(78, 55 / (a * 1.18)) : 55;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', layout);

scene.add(new THREE.HemisphereLight(0xcdd7ff, 0x402a55, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(4, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
sun.shadow.camera.top = 6; sun.shadow.camera.bottom = -6;
scene.add(sun);
const fillA = new THREE.PointLight(0xff9ecb, 10, 11);
fillA.position.set(MACHINE_X[0], 3.8, 2.6);
scene.add(fillA);
const fillB = new THREE.PointLight(0xffd9c9, 10, 11);
fillB.position.set(MACHINE_X[1], 3.8, 2.6);
scene.add(fillB);

/* ================= cannon-es ================= */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
// SAPBroadphase は2筐体構成 (X軸に離れた多数の静的ボディ) で衝突ペアを
// 取りこぼし、景品が床をすり抜けるため Naive を使う (体数が少ないので十分速い)
world.broadphase = new CANNON.NaiveBroadphase();
world.solver.iterations = 14;
const matGround = new CANNON.Material('ground');
const matPrize = new CANNON.Material('prize');
const matClaw = new CANNON.Material('claw');
world.addContactMaterial(new CANNON.ContactMaterial(matGround, matPrize, { friction: 0.45, restitution: 0.25 }));
world.addContactMaterial(new CANNON.ContactMaterial(matPrize, matPrize, { friction: 0.4, restitution: 0.2 }));
world.addContactMaterial(new CANNON.ContactMaterial(matClaw, matPrize, {
  friction: 0.9, restitution: 0,
  contactEquationStiffness: 1e7, contactEquationRelaxation: 4,
}));
// 衝突グループ: 指は景品だけと衝突させる
const G_STATIC = 1, G_PRIZE = 2, G_CLAW = 4;

function staticBox(cx, cy, cz, sx, sy, sz) {
  const body = new CANNON.Body({
    type: CANNON.Body.STATIC, material: matGround,
    shape: new CANNON.Box(new CANNON.Vec3(sx / 2, sy / 2, sz / 2)),
  });
  body.position.set(cx, cy, cz);
  world.addBody(body);
  return body;
}

/* ================= 共有マテリアル ================= */
const darkMat = new THREE.MeshStandardMaterial({ color: 0x241238, roughness: 0.8 });
const clawMetal = new THREE.MeshStandardMaterial({ color: 0xd8dce6, roughness: 0.25, metalness: 0.9 });
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xbfe4ff, transmission: 0.92, transparent: true, opacity: 0.22,
  roughness: 0.05, metalness: 0, side: THREE.DoubleSide, depthWrite: false,
});

/* ================= サウンド (効果音) ================= */
let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur = 0.1, type = 'square', vol = 0.12, delay = 0) {
  try {
    const ctx = audio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    const t0 = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t0); o.stop(t0 + dur);
  } catch (e) { /* 音は無くてもゲームは続行 */ }
}
const sfx = {
  press: () => tone(660, 0.07, 'square', 0.08),
  grab: () => { tone(240, 0.12, 'sawtooth', 0.1); tone(180, 0.15, 'sawtooth', 0.08, 0.1); },
  win: () => { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.16, 'triangle', 0.16, i * 0.12)); },
  lose: () => { tone(330, 0.2, 'sine', 0.1); tone(247, 0.3, 'sine', 0.1, 0.18); },
  coin: () => { tone(988, 0.08, 'square', 0.1); tone(1319, 0.15, 'square', 0.1, 0.08); },
};

/* ================= BGM (チップチューン風ループ / 小音量) ================= */
const BGM_STEP = 0.135; // 16分音符の長さ (秒)
const bgmBassBar = r => [r, 0, 0, 0, r + 7, 0, 0, 0, r, 0, 0, 0, r + 7, 0, r + 12, 0];
const BGM_BASS = [...bgmBassBar(48), ...bgmBassBar(45), ...bgmBassBar(41), ...bgmBassBar(43)];
const BGM_LEAD = [
  72, 0, 76, 0, 79, 0, 76, 0, 72, 0, 76, 0, 79, 0, 81, 79,
  81, 0, 76, 0, 72, 0, 76, 0, 81, 0, 84, 0, 81, 0, 79, 76,
  77, 0, 81, 0, 84, 0, 81, 0, 77, 0, 74, 0, 77, 0, 79, 81,
  79, 0, 74, 0, 71, 0, 74, 0, 79, 0, 83, 0, 86, 0, 83, 79,
];
const midiFreq = n => 440 * Math.pow(2, (n - 69) / 12);

let bgmOn = localStorage.getItem('claw_bgm') !== '0';
let bgmGain = null, bgmTimer = null, bgmStep = 0, bgmNext = 0;

function bgmNote(midi, t, type, vol, dur) {
  const ctx = actx;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = midiFreq(midi);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(bgmGain);
  o.start(t); o.stop(t + dur);
}
function bgmTick() {
  if (!actx || actx.state !== 'running') return;
  // タブ非アクティブ等で遅れた場合は追い付かずに仕切り直す
  if (bgmNext < actx.currentTime - 0.3) bgmNext = actx.currentTime + 0.1;
  while (bgmNext < actx.currentTime + 0.3) {
    if (bgmOn) {
      const s = bgmStep % 64;
      const l = BGM_LEAD[s];
      if (l) bgmNote(l, bgmNext, 'square', 0.22, 0.2);
      const b = BGM_BASS[s];
      if (b) bgmNote(b, bgmNext, 'triangle', 0.5, 0.3);
    }
    bgmStep++;
    bgmNext += BGM_STEP;
  }
}
function startBGM() {
  try {
    const ctx = audio();
    if (!bgmGain) {
      bgmGain = ctx.createGain();
      bgmGain.gain.value = 0.05; // ほんのり小さく
      bgmGain.connect(ctx.destination);
    }
    if (!bgmTimer) {
      bgmNext = ctx.currentTime + 0.1;
      bgmTimer = setInterval(bgmTick, 80);
    }
  } catch (e) { /* BGMなしでも続行 */ }
}
const btnBgm = document.getElementById('btnBgm');
function refreshBgmButton() {
  btnBgm.textContent = bgmOn ? '🔊 BGM' : '🔇 BGM';
  btnBgm.classList.toggle('off', !bgmOn);
}
function toggleBGM() {
  bgmOn = !bgmOn;
  localStorage.setItem('claw_bgm', bgmOn ? '1' : '0');
  refreshBgmButton();
  if (bgmOn) startBGM();
}
btnBgm.addEventListener('pointerdown', e => { e.preventDefault(); toggleBGM(); });
refreshBgmButton();
// 最初のタップ / クリックでオーディオを起動 (自動再生制限対策)
window.addEventListener('pointerdown', () => { audio(); startBGM(); });

/* ================= UI ================= */
const $plays = document.getElementById('plays');
const $wins = document.getElementById('wins');
const $msg = document.getElementById('msg');
const $hint = document.getElementById('hint');
const btnX = document.getElementById('btnX');
const btnZ = document.getElementById('btnZ');
const btnCoin = document.getElementById('btnCoin');

function updateHUD() {
  $plays.textContent = String(plays).padStart(2, '0');
  $wins.textContent = String(wins).padStart(2, '0');
  btnCoin.classList.toggle('attention', plays === 0);
}
let msgTimer = 0;
function showMsg(text, ms = 1400, isWin = false) {
  $msg.textContent = text;
  $msg.classList.toggle('win', isWin);
  $msg.classList.add('show');
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => $msg.classList.remove('show'), ms);
}
function setHint(text) {
  $hint.textContent = text;
  $hint.style.display = text ? '' : 'none';
}

/* ================= 背景 (ゲームセンターの店内) ================= */
// 部屋: x±13.5 / z -10.5..12.5 / 床 -1.86 / 天井 7.25
{
  // アーケードカーペットの床
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#150a2e'; g.fillRect(0, 0, 256, 256);
  const cols = ['#ff2f8e', '#29d3ff', '#ffd23f', '#7dff8a', '#c08fff'];
  for (let i = 0; i < 70; i++) {
    const col = cols[i % cols.length];
    const x = Math.random() * 256, y = Math.random() * 256;
    g.globalAlpha = 0.4 + Math.random() * 0.3;
    g.fillStyle = col; g.strokeStyle = col; g.lineWidth = 2.5;
    const kind = i % 3;
    if (kind === 0) {
      g.beginPath(); g.arc(x, y, 2.5 + Math.random() * 3.5, 0, Math.PI * 2); g.fill();
    } else if (kind === 1) {
      const s = 5 + Math.random() * 6;
      g.beginPath(); g.moveTo(x, y - s); g.lineTo(x + s, y + s); g.lineTo(x - s, y + s); g.closePath(); g.fill();
    } else {
      g.beginPath(); g.moveTo(x, y);
      for (let k = 1; k <= 3; k++) g.lineTo(x + k * 7, y + (k % 2 ? -6 : 6));
      g.stroke();
    }
  }
  g.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(8, 7);
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(28, 24),
    new THREE.MeshStandardMaterial({ map: t, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(0, -1.86, 1);
  floor.receiveShadow = true;
  scene.add(floor);
}

// 壁と天井
{
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a0d36, roughness: 0.95 });
  const mkWall = (w, h, x, y, z, ry) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
    m.position.set(x, y, z);
    m.rotation.y = ry;
    scene.add(m);
  };
  mkWall(28, 9.4, 0, 2.8, -10.5, 0);           // 奥

function makeFinger() {
  const pivot = new THREE.Group();
  let parent = pivot;
  for (let k = 0; k < 3; k++) {
    const joint = new THREE.Group();
    if (k > 0) { joint.position.y = -SEG_LEN; joint.rotation.z = BEND; }
    const [t, w] = FINGER_DIMS[k];
    const seg = new THREE.Mesh(new THREE.BoxGeometry(t, SEG_LEN + 0.02, w), clawMetal);
    seg.position.y = -SEG_LEN / 2;

    joint.add(seg);

    knuckle.castShadow = true;
    joint.add(knuckle);
    parent.add(joint);
    parent = joint;
  }
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.038, 0.15, 10), clawMetal);
  tip.position.y = -SEG_LEN - 0.055;

    box(carpetMat, 0, -0.25, (HOLE.z0 - FIELD) / 2, FIELD * 2, 0.5, HOLE.z0 + FIELD);
    sbox(0, -0.25, (HOLE.z0 - FIELD) / 2, FIELD * 2, 0.5, HOLE.z0 + FIELD);
    box(carpetMat, (HOLE.x1 + FIELD) / 2, -0.25, (HOLE.z0 + FIELD) / 2, FIELD - HOLE.x1, 0.5, FIELD - HOLE.z0);
    sbox((HOLE.x1 + FIELD) / 2, -0.25, (HOLE.z0 + FIELD) / 2, FIELD - HOLE.x1, 0.5, FIELD - HOLE.z0);

    // 落とし口のバリア (黄色い縁)
    const bh = 0.55, bt = 0.1;
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xffd23f, roughness: 0.4 });
    box(rimMat, HOLE.x1, bh / 2, (HOLE.z0 + HOLE.z1) / 2, bt, bh, HOLE.z1 - HOLE.z0 + bt);
    sbox(HOLE.x1, bh / 2, (HOLE.z0 + HOLE.z1) / 2, bt, bh, HOLE.z1 - HOLE.z0 + bt);
    box(rimMat, (HOLE.x0 + HOLE.x1) / 2, bh / 2, HOLE.z0, HOLE.x1 - HOLE.x0, bh, bt);
    sbox((HOLE.x0 + HOLE.x1) / 2, bh / 2, HOLE.z0, HOLE.x1 - HOLE.x0, bh, bt);

    const holeW = HOLE.x1 - HOLE.x0, holeD = HOLE.z1 - HOLE.z0;
    // 見えない壁: 獲得口には真上からしか入れない
    const SHAFT_TOP = 1.7;
    sbox(HOLE.x1, SHAFT_TOP / 2, (HOLE.z0 + HOLE.z1) / 2, bt, SHAFT_TOP, holeD + 0.4);
    sbox((HOLE.x0 + HOLE.x1) / 2, SHAFT_TOP / 2, HOLE.z0, holeW + 0.4, SHAFT_TOP, bt);
    sbox(HOLE.x0 - 0.06, SHAFT_TOP / 2, (HOLE.z0 + HOLE.z1) / 2, 0.12, SHAFT_TOP, holeD + 0.4);
    sbox((HOLE.x0 + HOLE.x1) / 2, SHAFT_TOP / 2, HOLE.z1 + 0.06, holeW + 0.4, SHAFT_TOP, 0.12);
    box(darkMat, HOLE.x0 + holeW / 2, -0.9, HOLE.z0 - 0.02, holeW, 1.8, 0.04, false);
    box(darkMat, HOLE.x0 + holeW / 2, -0.9, HOLE.z1 + 0.02, holeW, 1.8, 0.04, false);
    box(darkMat, HOLE.x0 - 0.02, -0.9, HOLE.z0 + holeD / 2, 0.04, 1.8, holeD, false);
    box(darkMat, HOLE.x1 + 0.02, -0.9, HOLE.z0 + holeD / 2, 0.04, 1.8, holeD, false);

    spawnPoints = [
      { x: -0.1, z: -1.1 },
      { x: 1.15, z: -0.35 },
      { x: 0.35, z: 0.75 },
    ];
    prizeColors = PRIZE_COLORS;
    prizeTypes = [
      { make: makeCapsuleMesh, shapes: () => [{ shape: new CANNON.Sphere(0.33) }] },
      { make: makeGiftMesh, shapes: () => [{ shape: new CANNON.Box(new CANNON.Vec3(0.27, 0.27, 0.27)) }] },
      { make: makeCanMesh, shapes: () => [{ shape: new CANNON.Cylinder(0.26, 0.26, 0.6, 12) }] },
      { make: makeBearMesh, shapes: () => [
        { shape: new CANNON.Sphere(0.27), offset: new CANNON.Vec3(0, -0.08, 0) },
        { shape: new CANNON.Sphere(0.2), offset: new CANNON.Vec3(0, 0.26, 0) },
      ] },
    ];
  } else {
    // 橋渡し: 平行な2本のバーだけを渡し、その上にフィギュア箱を置く。
    // 棚などの平面は無く、下は素通しのピット (落ちたら GET)
    const BAR_Y = 0.95, BAR_R = 0.07, BAR_Z1 = 0.25, BAR_Z2 = 0.85;

    // ピットの底 (見た目のみ。物理の床は無い)
    box(darkMat, 0, -0.2, 0, FIELD * 2, 0.04, FIELD * 2, false);

    // 橋 (2本の金属バー) と両端の支柱
    const barGeo = new THREE.CylinderGeometry(BAR_R, BAR_R, FIELD * 2 - 0.04, 16);
    for (const bz of [BAR_Z1, BAR_Z2]) {
      const bar = new THREE.Mesh(barGeo, clawMetal);
      bar.rotation.z = Math.PI / 2;
      bar.position.set(0, BAR_Y, bz);
      bar.castShadow = true;
      group.add(bar);
      for (const px of [-FIELD + 0.1, FIELD - 0.1]) {
        box(darkMat, px, (BAR_Y - 0.18) / 2, bz, 0.08, BAR_Y + 0.18, 0.08);
      }
    }
    const barBody = new CANNON.Body({ type: CANNON.Body.STATIC, material: matGround });
    const barQ = new CANNON.Quaternion().setFromEuler(0, 0, Math.PI / 2);
    barBody.addShape(new CANNON.Cylinder(BAR_R, BAR_R, FIELD * 2 - 0.04, 12), new CANNON.Vec3(0, BAR_Y, BAR_Z1), barQ);
    barBody.addShape(new CANNON.Cylinder(BAR_R, BAR_R, FIELD * 2 - 0.04, 12), new CANNON.Vec3(0, BAR_Y, BAR_Z2), barQ);
    barBody.position.set(O.x, 0, O.z);
    world.addBody(barBody);

    spawnPoints = [
      { x: -0.8, z: (BAR_Z1 + BAR_Z2) / 2 },
      { x: 0.8, z: (BAR_Z1 + BAR_Z2) / 2 },
    ];
    prizeColors = [0x3ba7ff, 0xff5fa2, 0xff8f3a];
    prizeTypes = [
      { make: makeFigureBoxMesh, shapes: () => [{ shape: new CANNON.Box(new CANNON.Vec3(0.28, 0.175, 0.425)) }] },
    ];
  }

  /* ---- クレーン ---- */
  const yaws = cfg.fingerYaws;
  const N = yaws.length;

  const beam = new THREE.Mesh(new THREE.BoxGeometry(FIELD * 2 + 0.3, 0.14, 0.2), clawMetal);
  beam.castShadow = true;
  scene.add(beam);
  const trolley = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.24, 0.36), clawAccent);
  trolley.castShadow = true;
  scene.add(trolley);
  const rope = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 1, 8), darkMat);
  scene.add(rope);

  const claw = new THREE.Group();
  scene.add(claw);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.22, 0.26, 20), clawAccent);
  hub.castShadow = true;
  claw.add(hub);
  const hubTop = new THREE.Mesh(new THREE.SphereGeometry(0.17, 20, 12, 0, Math.PI * 2, 0, Math.PI / 2), clawAccent);
  hubTop.position.y = 0.13;
  claw.add(hubTop);

  const fingers = [];
  for (let i = 0; i < N; i++) {
    const hinge = new THREE.Group();
    hinge.rotation.y = yaws[i];
    const pivot = makeFinger();
    pivot.position.set(0.16, -0.1, 0);
    hinge.add(pivot);
    claw.add(hinge);
    fingers.push(pivot);
  }

  // クロー全体をひとつの動体 (ハブ+指ボックスの複合形状) にして、ロープで吊るす
  const HOMEW = { x: O.x + cfg.homeX, z: O.z + cfg.homeZ };
  const clawBody = new CANNON.Body({
    mass: 3, material: matClaw,
    collisionFilterGroup: G_CLAW, collisionFilterMask: G_PRIZE,
    fixedRotation: true, linearDamping: 0.05,
  });
  clawBody.addShape(new CANNON.Sphere(0.2));
  for (let i = 0; i < N; i++) {
    for (let k = 0; k < 3; k++) {
      const [t, w] = FINGER_DIMS[k];
      const sh = new CANNON.Box(new CANNON.Vec3(t / 2, (SEG_LEN + 0.02) / 2, w / 2));
      sh.fingerIndex = i;
      clawBody.addShape(sh);
    }
  }
  clawBody.position.set(HOMEW.x, CLAW_TOP_Y, HOMEW.z);
  world.addBody(clawBody);

  // 照準リング
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.3, 0.4, 32),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.28, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = cfg.ringY;
  scene.add(ring);

  /* ---- 筐体オブジェクト ---- */
  const M = {
    cfg, origin: O, prizes,
    clawBody,
    clawPos: new THREE.Vector3(HOMEW.x, CLAW_TOP_Y, HOMEW.z),
    fingerOpen: new Array(N).fill(0),
    fingerTouched: new Array(N).fill(false),
    fingerDepth: new Array(N).fill(0),
    state: 'READY', stateTime: 0,
    holdX: false, holdZ: false,
    carried: null, grabSfxDone: false, justWon: false, slipT: 0,
  };
  const XMAXW = O.x + 1.6, ZMINW = O.z - 1.6;
  const BOTTOM = cfg.clawBottomY;

  const _qy = new CANNON.Quaternion(), _qz = new CANNON.Quaternion();
  function updateClawShapes() {
    for (let i = 0; i < N; i++) {
      const yaw = yaws[i];
      const cosYaw = Math.cos(yaw), sinYaw = Math.sin(yaw);
      const theta = FINGER_CLOSED + (FINGER_OPEN - FINGER_CLOSED) * M.fingerOpen[i];
      const ct = Math.cos(theta), st = Math.sin(theta);
      _qy.setFromAxisAngle(CANNON.Vec3.UNIT_Y, yaw);
      for (let k = 0; k < 3; k++) {
        const s = FINGER_SEGS[k];
        const lx = 0.16 + s.cx * ct - s.cy * st;
        const ly = -0.1 + s.cx * st + s.cy * ct;
        const idx = 1 + i * 3 + k;
        clawBody.shapeOffsets[idx].set(lx * cosYaw, ly, -lx * sinYaw);
        _qz.setFromAxisAngle(CANNON.Vec3.UNIT_Z, theta + s.ang);
        _qy.mult(_qz, clawBody.shapeOrientations[idx]);
      }
    }
    clawBody.updateBoundingRadius();
    clawBody.aabbNeedsUpdate = true;
  }
  updateClawShapes();

  // ロープ: ばね+減衰。引っ張りにしか効かない
  const _ropeF = new CANNON.Vec3();
  function applyRopeForce() {
    const b = clawBody;
    const fx = (M.clawPos.x - b.position.x) * 90 - b.velocity.x * 12;
    const fz = (M.clawPos.z - b.position.z) * 90 - b.velocity.z * 12;
    const stretch = M.clawPos.y - b.position.y;
    const fy = stretch > 0 ? stretch * 600 - b.velocity.y * 30 : -b.velocity.y * 3;
    b.applyForce(_ropeF.set(fx, fy, fz));
  }

  const _ropeTop = new THREE.Vector3(), _ropeDir = new THREE.Vector3();
  const UP_VEC = new THREE.Vector3(0, 1, 0);
  function syncCrane() {
    claw.position.copy(clawBody.position);
    fingers.forEach((f, i) => { f.rotation.z = FINGER_CLOSED + (FINGER_OPEN - FINGER_CLOSED) * M.fingerOpen[i]; });
    beam.position.set(O.x, RAIL_Y, M.clawPos.z);
    trolley.position.set(M.clawPos.x, RAIL_Y - 0.05, M.clawPos.z);
    _ropeTop.set(M.clawPos.x, RAIL_Y - 0.15, M.clawPos.z);
    _ropeDir.set(clawBody.position.x, clawBody.position.y + 0.2, clawBody.position.z).sub(_ropeTop);
    const len = Math.max(0.05, _ropeDir.length());
    rope.scale.y = len;
    rope.position.copy(_ropeTop).addScaledVector(_ropeDir, 0.5);
    rope.quaternion.setFromUnitVectors(UP_VEC, _ropeDir.normalize());
    ring.position.x = clawBody.position.x;
    ring.position.z = clawBody.position.z;
  }

  function spawnPrize(spawnIndex, type = Math.floor(Math.random() * prizeTypes.length), y = cfg.spawnY) {
    const color = prizeColors[Math.floor(Math.random() * prizeColors.length)];
    const kind = prizeTypes[type];
    const mesh = kind.make(color);
    scene.add(mesh);
    const body = new CANNON.Body({
      mass: cfg.prizeMass, material: matPrize,
      angularDamping: 0.6, linearDamping: 0.05,
      collisionFilterGroup: G_PRIZE,
      collisionFilterMask: G_STATIC | G_PRIZE | G_CLAW,
    });
    for (const { shape, offset } of kind.shapes()) body.addShape(shape, offset);
    const sp = spawnPoints[spawnIndex];
    body.position.set(O.x + sp.x, y, O.z + sp.z);
    const yaw = cfg.alignedSpawn ? (Math.random() - 0.5) * 0.12 : Math.random() * Math.PI * 2;
    body.quaternion.setFromEuler(0, yaw, 0);
    world.addBody(body);
    const p = { mesh, body, alive: true, spawnIndex };
    prizes.push(p);
    return p;
  }
  M.spawnPrize = spawnPrize;

  function removePrize(p) {
    p.alive = false;
    world.removeBody(p.body);
    scene.remove(p.mesh);
    const i = prizes.indexOf(p);
    if (i >= 0) prizes.splice(i, 1);
  }

  // 初期配置 (種類がかぶらないようにシャッフル)
  {
    const order = prizeTypes.map((_, i) => i).sort(() => Math.random() - 0.5);
    for (let i = 0; i < spawnPoints.length; i++) spawnPrize(i, order[i % order.length]);
  }

  /* ---- 状態マシン ---- */
  function applyButtons() {
    btnX.disabled = !((M.state === 'READY' && plays > 0) || M.state === 'MOVE_X');
    btnZ.disabled = !(M.state === 'WAIT_Z' || M.state === 'MOVE_Z');
    if (M.state === 'READY') setHint(plays > 0 ? '→ ボタンで スタート! / ドラッグで カメラ' : 'コインを いれてね!');
    else if (M.state === 'WAIT_Z') setHint('↑ ボタンで オクへ!');
    else setHint('');
  }
  M.applyButtons = applyButtons;

  function setState(s) {
    M.state = s;
    M.stateTime = 0;
    if (machines[active] === M) applyButtons();
  }
  M.setState = setState;

  M.startX = () => {
    if (M.state !== 'READY' || plays <= 0) return;
    plays--;
    updateHUD();
    sfx.press();
    M.holdX = true;
    setState('MOVE_X');
  };
  M.endX = () => {
    M.holdX = false;
    if (M.state === 'MOVE_X') { sfx.press(); setState('WAIT_Z'); }
  };
  M.startZ = () => {
    if (M.state !== 'WAIT_Z') return;
    sfx.press();
    M.holdZ = true;
    setState('MOVE_Z');
  };
  M.endZ = () => {
    M.holdZ = false;
    if (M.state === 'MOVE_Z') { sfx.press(); setState('OPENING'); }
  };

  // 運搬中、景品がずり落ち続けている時だけ指を握り直す
  function ratchetGrip(dt) {
    let slipping = false;
    for (const p of prizes) {
      const b = p.body;
      if (Math.hypot(b.position.x - clawBody.position.x, b.position.z - clawBody.position.z) < 0.5 &&
          b.position.y < clawBody.position.y && b.position.y > clawBody.position.y - 1.2 &&
          clawBody.velocity.y - b.velocity.y > 0.15) {
        slipping = true;
      }
    }
    M.slipT = slipping ? M.slipT + dt : 0;
    if (M.slipT > 0.12) {
      for (let i = 0; i < N; i++) {
        if (M.fingerDepth[i] < 0.02) {
          M.fingerOpen[i] = Math.max(0, M.fingerOpen[i] - dt / (M.fingerTouched[i] ? 8.0 : 0.8));
        }
      }
    }
  }

  function moveFingers(target, duration, dt) {
    let done = true;
    for (let i = 0; i < N; i++) {
      const d = target - M.fingerOpen[i];
      const step = dt / duration;
      if (Math.abs(d) <= step) M.fingerOpen[i] = target;
      else { M.fingerOpen[i] += Math.sign(d) * step; done = false; }
    }
    return done;
  }

  function moveToward(current, target, speed, dt) {
    const d = target - current;
    const step = speed * dt;
    return Math.abs(d) <= step ? target : current + Math.sign(d) * step;
  }

  M.preStep = (dt) => {
    M.stateTime += dt;
    const clawPos = M.clawPos;
    switch (M.state) {
      case 'MOVE_X':
        if (M.holdX) clawPos.x = Math.min(XMAXW, clawPos.x + MOVE_SPEED * dt);
        break;
      case 'MOVE_Z':
        if (M.holdZ) clawPos.z = Math.max(ZMINW, clawPos.z - MOVE_SPEED * dt);
        break;
      case 'OPENING': // 降りる前にアームを開く
        if (moveFingers(1, 0.45, dt) && M.stateTime > 0.55) setState('DESCEND');
        break;
      case 'DESCEND':
        clawPos.y = moveToward(clawPos.y, BOTTOM, DROP_SPEED, dt);
        if (clawPos.y === BOTTOM &&
            (clawBody.position.y - BOTTOM < 0.25 || M.stateTime > 2.6)) {
          M.grabSfxDone = false;
          setState('GRAB');
        }
        break;
      case 'GRAB': {
        // 接触なし: 普通に閉じる / 浅い接触: ゆっくり回り込む / 深いめり込み: 停止
        let allClosed = true;
        for (let i = 0; i < N; i++) {
          if (M.fingerDepth[i] < 0.02) {
            M.fingerOpen[i] = Math.max(0, M.fingerOpen[i] - dt / (M.fingerTouched[i] ? 8.0 : 0.8));
          }
          if (M.fingerOpen[i] > 0) allClosed = false;
          if (M.fingerTouched[i] && !M.grabSfxDone) {
            M.grabSfxDone = true;
            sfx.grab();
            if (navigator.vibrate) navigator.vibrate(40);
          }
        }
        if ((allClosed && M.stateTime > 0.9) || M.stateTime > 1.6) setState('LIFT');
        break;
      }
      case 'LIFT':
        ratchetGrip(dt);
        clawPos.y = moveToward(clawPos.y, CLAW_TOP_Y, LIFT_SPEED, dt);
        if (clawPos.y === CLAW_TOP_Y &&
            (CLAW_TOP_Y - clawBody.position.y < 0.3 || M.stateTime > 3.2)) {
          if (cfg.openInPlace) {
            setState('OPEN'); // 橋渡し: その場で開いて落とす
          } else {
            M.carried = prizes.find(p =>
              Math.hypot(p.body.position.x - clawBody.position.x, p.body.position.z - clawBody.position.z) < 0.55 &&
              p.body.position.y > CLAW_TOP_Y - 1.4
            ) || null;
            setState('RETURN');
          }
        }
        break;
      case 'RETURN':
        if (cfg.openInPlace) {
          moveFingers(0, 0.6, dt); // 帰りは閉じながら
        } else {
          ratchetGrip(dt);
        }
        clawPos.x = moveToward(clawPos.x, HOMEW.x, RETURN_SPEED, dt);
        clawPos.z = moveToward(clawPos.z, HOMEW.z, RETURN_SPEED, dt);
        if (!cfg.openInPlace && M.carried && M.carried.alive && M.carried.body.position.y < 1.1) {
          M.carried = null;
          showMsg('あっ…!', 900);
          tone(200, 0.2, 'sine', 0.1);
        }
        if (clawPos.x === HOMEW.x && clawPos.z === HOMEW.z &&
            (Math.hypot(clawBody.position.x - HOMEW.x, clawBody.position.z - HOMEW.z) < 0.3 || M.stateTime > 4.5)) {
          setState(cfg.openInPlace ? 'WAIT' : 'OPEN');
        }
        break;
      case 'OPEN':
        if (moveFingers(1, 0.35, dt) && M.stateTime > 0.6) setState(cfg.openInPlace ? 'RETURN' : 'WAIT');
        break;
      case 'WAIT':
        moveFingers(0, 0.5, dt);
        if (M.stateTime > 1.7) {
          if (!M.justWon) { showMsg('ざんねん…', 1100); sfx.lose(); }
          M.justWon = false;
          M.carried = null;
          setState('READY');
        }
        break;
    }
    updateClawShapes();
    applyRopeForce();
  };

  M.postStep = (dt) => {
    for (const p of [...prizes]) {
      p.mesh.position.copy(p.body.position);
      p.mesh.quaternion.copy(p.body.quaternion);
      // 落とし口 / バーの隙間に落ちた → GET
      if (p.body.position.y < cfg.catchY) {
        if (p === M.carried) M.carried = null;
        removePrize(p);
        wins++;
        M.justWon = true;
        updateHUD();
        showMsg('🎉 GET!! 🎉', 1800, true);
        sfx.win();
        if (navigator.vibrate) navigator.vibrate([60, 40, 120]);
        const slot = p.spawnIndex;
        setTimeout(() => spawnPrize(slot, undefined, cfg.respawnY), 1200);
      }
    }
    syncCrane();
  };

  machines.push(M);
  return M;
}

/* ================= 筐体の切り替え ================= */
const tabEls = [...document.querySelectorAll('.tab')];
// URL の ?m=1 で初期筐体を指定できる
{
  const q = Number(new URLSearchParams(location.search).get('m'));
  if (q === 1) {
    active = 1;
    tabEls.forEach((el, k) => el.classList.toggle('active', k === active));
    controls.target.x = MACHINE_X[1];
    camera.position.x = MACHINE_X[1];
  }
}
function selectMachine(i) {
  if (i === active) return;
  const old = machines[active];
  if (old.holdX) old.endX();
  if (old.holdZ) old.endZ();
  active = i;
  tabEls.forEach((el, k) => el.classList.toggle('active', k === active));
  machines[active].applyButtons();
  sfx.press();
}
tabEls.forEach(el => {
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    audio();
    selectMachine(Number(el.dataset.m));
  });
});

/* ================= 入力 ================= */
function insertCoin() {
  plays += 5;
  updateHUD();
  sfx.coin();
  showMsg('CREDIT +5', 900);
  machines[active].applyButtons();
}

function bindHold(el, onDown, onUp) {
  el.addEventListener('pointerdown', e => { e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); audio(); onDown(); });
  const up = e => { e.preventDefault(); el.classList.remove('pressed'); onUp(); };
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}
bindHold(btnX, () => machines[active].startX(), () => machines[active].endX());
bindHold(btnZ, () => machines[active].startZ(), () => machines[active].endZ());
btnCoin.addEventListener('pointerdown', e => { e.preventDefault(); audio(); insertCoin(); });

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'ArrowRight') machines[active].startX();
  if (e.key === 'ArrowUp') machines[active].startZ();
  if (e.key === 'c') insertCoin();
  if (e.key === 'b') toggleBGM();
  if (e.key === '1') selectMachine(0);
  if (e.key === '2') selectMachine(1);
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowRight') machines[active].endX();
  if (e.key === 'ArrowUp') machines[active].endZ();
});

/* ================= メインループ ================= */
const _gap = new CANNON.Vec3();
let last = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.max(0.001, Math.min(0.05, (now - last) / 1000));
  last = now;
  const t = now / 1000;

  /* --- 各筐体の状態マシン + ロープ --- */
  for (const m of machines) m.preStep(dt);

  /* --- 物理 (全筐体共有ワールド) --- */
  world.step(1 / 60, dt, 3);

  // 指と景品の接触・めり込み深さを検出 (閉じ動作の制御に使う)
  for (const m of machines) {
    m.fingerTouched.fill(false);
    m.fingerDepth.fill(0);
  }
  for (const eq of world.contacts) {
    for (const m of machines) {
      if (eq.bi === m.clawBody || eq.bj === m.clawBody) {
        const shape = eq.bi === m.clawBody ? eq.si : eq.sj;
        const other = eq.bi === m.clawBody ? eq.bj : eq.bi;
        if (other.material === matPrize && shape.fingerIndex !== undefined) {
          const i = shape.fingerIndex;
          m.fingerTouched[i] = true;
          _gap.copy(eq.bj.position); _gap.vadd(eq.rj, _gap);
          _gap.vsub(eq.bi.position, _gap); _gap.vsub(eq.ri, _gap);
          const d = -_gap.dot(eq.ni);
          if (d > m.fingerDepth[i]) m.fingerDepth[i] = d;
        }
        break;
      }
    }
  }

  for (const m of machines) m.postStep(dt);

  /* --- カメラ: 選択中の筐体へスムーズにパン --- */
  {
    const targetX = machines[active].origin.x;
    const dx = (targetX - controls.target.x) * Math.min(1, dt * 4);
    controls.target.x += dx;
    camera.position.x += dx;
  }

  /* --- 背景アニメ --- */
  const phase = Math.floor(t * 4);
  for (const { bulbs, mats } of bulbSets) {
    for (let i = 0; i < bulbs.length; i++) bulbs[i].material = mats[(i + phase) % mats.length];
  }
  controls.update();
  renderer.render(scene, camera);
}

layout();
updateHUD();
machines[active].applyButtons();
requestAnimationFrame(animate);
</script>
</body>
</html>
